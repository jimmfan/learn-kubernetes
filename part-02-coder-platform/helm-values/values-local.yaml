coder:
  service:
    type: ClusterIP

  env:
    - name: CODER_ACCESS_URL
      value: "http://localhost:30080"
    - name: CODER_OAUTH2_GITHUB_DEFAULT_PROVIDER_ENABLE
      value: "false"
    - name: CODER_PG_CONNECTION_URL
      valueFrom:
        secretKeyRef:
          name: coder-db-url
          key: url

