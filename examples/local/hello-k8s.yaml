apiVersion: v1
kind: Namespace
metadata:
  name: hello
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-web
  namespace: hello
  labels:
    app.kubernetes.io/name: hello-web
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: hello-web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: hello-web
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: hello-web
  namespace: hello
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: hello-web
  ports:
    - name: http
      port: 80
      targetPort: 80

